services:
  - type: web
    name: gymverse-api
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: npm run start -w apps/api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: gymverse
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATA_ENCRYPTION_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: ADMIN_ORIGIN
        sync: false
      - key: AUTH_RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: AUTH_RATE_LIMIT_MAX
        value: 12
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADO_PAGO_WEBHOOK_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
